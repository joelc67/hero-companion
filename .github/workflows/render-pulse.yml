name: Render Pulse Boards
# RELOCATED 2026-07-14 (the Actions-quota incident): the render used to run
# per-push on the PRIVATE inbox repo, where every 31-second run billed a full
# minute of the 2,000/month private-repo allowance — 2,031 runs burned the
# entire quota by mid-month. Here on the PUBLIC repo, standard-runner minutes
# are free at any feeder count, and the schedule (never per-push) batches
# everything accumulated since the last run.
#
# PRIVACY BOUNDARY (this repo's logs are PUBLIC): the private inbox is checked
# out via a fine-grained READ-ONLY token into the runner's private workspace.
# No step prints inbox contents, no artifacts are uploaded, and the ONLY thing
# committed is the sanitized public board build_pulse_boards produces — its
# public-variant filter is the tested privacy boundary. Raw uploads never
# leave the private repo.
#
# COLLECT NOTE: chunk compaction WRITES to the inbox, which a read-only token
# cannot — collection lives in the inbox repo's own daily collect.yml
# (~31 billed minutes/month). Renders here read compacted + uncollected
# chunks alike, so a paused collect never stales the board.

# SCHEDULE HONESTY (measured 2026-07-15 from the run history): GitHub treats
# cron as BEST-EFFORT — our "*/15" fired every 60-90 minutes in practice, and
# there were ZERO push-triggered renders (the "bursting" runs seen that night
# were pages-build-deployment). Explicit off-peak minutes (GitHub's own advice:
# avoid :00/:15/:30/:45 contention) improve the odds; the real-world promise
# is "roughly hourly, sometimes better" and the page's two-layer staleness
# script tells viewers the truth either way.
on:
  schedule:
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch:

# PAGES SOURCE = GITHUB ACTIONS (2026-07-20, the daily failure-email fix): the
# site used to build in LEGACY mode (Deploy from branch master/docs), which ran
# Jekyll on every master push. jekyll-github-metadata called the Pages API and
# intermittently 503'd (confirmed in the annotations) — failing the build and
# emailing Joel, worst in rapid-push windows. Now this workflow OWNS the deploy:
# code pushes to master trigger NOTHING (no per-push build), the deploy runs only
# when the board is rendered (the schedule), and docs/.nojekyll skips Jekyll on
# the already-static site so the whole metadata/Liquid failure class is gone.
# cancel-in-progress: false — an in-flight Pages DEPLOY must never be cancelled
# (GitHub's own guidance); renders are idempotent so not cancelling them is safe.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: PAT expiry self-reminder (the runbook's first line of defense)
        run: |
          EXPIRY="2026-10-12"
          days_left=$(( ($(date -d "$EXPIRY" +%s) - $(date +%s)) / 86400 ))
          if [ "$days_left" -le 14 ]; then
            echo "::warning::INBOX_READ_TOKEN expires $EXPIRY (${days_left}d) — rotate per docs/pulse-pipeline-runbook.md"
          fi

      - uses: actions/checkout@v4
        with:
          path: site
          ref: master

      - uses: actions/checkout@v4
        with:
          repository: joelc67/hero-companion-inbox
          token: ${{ secrets.INBOX_READ_TOKEN }}
          path: inbox
          ref: main
          fetch-depth: 0     # source UTC offsets are inferred from chunk commit times

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: render
        env:
          PULSE_SITE_DIR: ${{ github.workspace }}/site
        working-directory: inbox
        run: python "$PULSE_SITE_DIR/tools/inbox_render.py"

      - name: Publish the rendered board
        if: steps.render.outputs.published == 'true'
        working-directory: site
        run: |
          git config user.name "Pulse Boards Pipeline"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/pulse/index.html
          git commit -m "Publish Pulse Boards (pipeline)" || exit 0
          git push || { git pull --rebase --autostash && git push; }

  # Deploy the site to GitHub Pages (Actions source). Runs after render in the
  # SAME run, so the render's freshly-committed board deploys without needing a
  # cross-workflow trigger (a GITHUB_TOKEN bot commit does not fire other
  # workflows). if: always() — deploy the last-known-good docs/ even when the
  # render published nothing or failed, so the board is never left un-deployed.
  deploy:
    needs: render
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
